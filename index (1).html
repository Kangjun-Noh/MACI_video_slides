<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MACI | Slides & Video</title>
  <meta name="description" content="Slides and video for the MACI paper">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f11;
      --panel: #151518;
      --text-main: #ffffff;
      --text-muted: #a0a0a0;
      --border: rgba(255,255,255,0.10);
      --accent: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      overflow: hidden;
    }
    a { color: inherit; text-decoration: none; }
    .page {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(15,15,17,0.92);
      backdrop-filter: blur(8px);
    }
    .topbar h1 {
      font-size: 1rem;
      line-height: 1.3;
      font-weight: 700;
    }
    .topbar p {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .home-link {
      font-size: 0.9rem;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 999px;
      transition: 0.2s ease;
      white-space: nowrap;
    }
    .home-link:hover {
      color: var(--text-main);
      border-color: rgba(255,255,255,0.25);
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: 0;
    }
    .panel {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--panel);
    }
    .panel:last-child {
      border-right: none;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.9rem;
      background: rgba(255,255,255,0.02);
    }
    .panel-body {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      overflow: hidden;
      background: #0b0b0c;
    }
    .video-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    .video-wrap iframe,
    .video-wrap video {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }
    .slide-viewer {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .slide-canvas-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      background: #111;
      border-radius: 10px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
      padding: 8px;
    }
    canvas {
      max-width: 100%;
      height: auto;
      display: block;
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .controls button {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text-main);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.92rem;
      cursor: pointer;
      transition: 0.2s ease;
    }
    .controls button:hover:not(:disabled) {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.22);
    }
    .controls button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .page-num {
      color: var(--text-muted);
      font-size: 0.92rem;
      min-width: 84px;
      text-align: center;
    }
    .hint {
      position: absolute;
      right: 18px;
      bottom: 14px;
      font-size: 0.82rem;
      color: var(--text-muted);
      opacity: 0.85;
    }
    @media (max-width: 900px) {
      body { overflow: auto; }
      .page { height: auto; min-height: 100vh; }
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }
      .panel {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .panel:last-child {
        border-bottom: none;
      }
      .panel-body {
        min-height: 52vh;
      }
      .hint {
        position: static;
        display: block;
        text-align: center;
        padding: 0 0 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>Enhancing Causal Discovery in Chronic Diseases: The MAGIC Framework Using Multiple LLMs</h1>
        <p>Slides & Video</p>
      </div>
      <a class="home-link" href="../../index.html">← Back to homepage</a>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="panel-header">
          <span>Video</span>
          <span>You can keep the video playing while navigating slides</span>
        </div>
        <div class="panel-body">
          <div class="video-wrap">
            <!-- Replace the iframe src below with your YouTube/SlidesLive/Vimeo embed URL.
                 Example (YouTube): https://www.youtube.com/embed/VIDEO_ID
                 If you want to use a local MP4 instead, comment out the iframe and use the <video> tag below. -->
            <iframe
              src="https://www.youtube.com/embed/YOUR_VIDEO_ID"
              title="MACI presentation video"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
            </iframe>

            <!-- Example for local MP4 (uncomment if needed)
            <video controls>
              <source src="video.mp4" type="video/mp4">
              Your browser does not support HTML5 video.
            </video>
            -->
          </div>
        </div>
      </section>

      <section class="panel" style="position:relative;">
        <div class="panel-header">
          <span>Slides</span>
          <span>Use ← / → keys or the buttons below</span>
        </div>
        <div class="panel-body">
          <div class="slide-viewer">
            <div class="slide-canvas-wrap">
              <canvas id="pdf-canvas"></canvas>
            </div>
            <div class="controls">
              <button id="prev">← Prev</button>
              <div id="page-num" class="page-num">Page 1 / 1</div>
              <button id="next">Next →</button>
            </div>
          </div>
        </div>
        <div class="hint">Place <code>slides.pdf</code> in this same folder.</div>
      </section>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    const url = 'slides.pdf';
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfDoc = null;
    let pageNum = 1;
    let pageRendering = false;
    let pageNumPending = null;
    const scale = 1.5;
    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');
    const pageNumEl = document.getElementById('page-num');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');

    function updateControls() {
      if (!pdfDoc) return;
      pageNumEl.textContent = `Page ${pageNum} / ${pdfDoc.numPages}`;
      prevBtn.disabled = pageNum <= 1;
      nextBtn.disabled = pageNum >= pdfDoc.numPages;
    }

    function renderPage(num) {
      pageRendering = true;
      pdfDoc.getPage(num).then(function(page) {
        const viewport = page.getViewport({ scale });
        const containerWidth = document.querySelector('.slide-canvas-wrap').clientWidth - 20;
        const fitScale = Math.min(scale, containerWidth / viewport.width);
        const scaledViewport = page.getViewport({ scale: fitScale });

        canvas.height = scaledViewport.height;
        canvas.width = scaledViewport.width;

        const renderContext = {
          canvasContext: ctx,
          viewport: scaledViewport
        };

        const renderTask = page.render(renderContext);
        renderTask.promise.then(function() {
          pageRendering = false;
          if (pageNumPending !== null) {
            renderPage(pageNumPending);
            pageNumPending = null;
          }
          updateControls();
        });
      });
    }

    function queueRenderPage(num) {
      if (pageRendering) {
        pageNumPending = num;
      } else {
        renderPage(num);
      }
    }

    function onPrevPage() {
      if (pageNum <= 1) return;
      pageNum--;
      queueRenderPage(pageNum);
    }

    function onNextPage() {
      if (pageNum >= pdfDoc.numPages) return;
      pageNum++;
      queueRenderPage(pageNum);
    }

    prevBtn.addEventListener('click', onPrevPage);
    nextBtn.addEventListener('click', onNextPage);

    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowLeft') onPrevPage();
      if (e.key === 'ArrowRight') onNextPage();
    });

    pdfjsLib.getDocument(url).promise.then(function(pdfDoc_) {
      pdfDoc = pdfDoc_;
      updateControls();
      renderPage(pageNum);
    }).catch(function(error) {
      document.querySelector('.slide-canvas-wrap').innerHTML = `
        <div style="color:#a0a0a0; text-align:center; padding:24px; line-height:1.8;">
          <div style="font-size:1rem; color:#fff; margin-bottom:10px;">Could not load <code>slides.pdf</code>.</div>
          <div>Put your slide PDF in this same folder:</div>
          <div style="margin-top:6px;"><code>projects/maci/slides.pdf</code></div>
        </div>
      `;
      prevBtn.disabled = true;
      nextBtn.disabled = true;
      pageNumEl.textContent = 'Slides not found';
      console.error(error);
    });

    window.addEventListener('resize', function() {
      if (pdfDoc) queueRenderPage(pageNum);
    });
  </script>
</body>
</html>
